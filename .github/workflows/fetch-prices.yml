name: Fetch stock prices

on:
  schedule:
    - cron: "30 9 * * 1-5"   # Mon–Fri 09:30 UTC
    - cron: "0 13 * * 1-5"   # Mon–Fri 13:00 UTC
    - cron: "0 17 * * 1-5"   # Mon–Fri 17:00 UTC
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run on"
        required: false
        default: "main"
      tickers:
        description: "Space-separated ticker symbols (leave empty to use configs/tickers.yml)"
        required: false
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas yfinance pyyaml schedule

      - name: Fetch stock prices
        env:
          TICKERS: ${{ inputs.tickers }}
        run: |
          if [ -n "$TICKERS" ]; then
            python -m src.finance.scheduler --once --tickers $TICKERS
          else
            python -m src.finance.scheduler --once
          fi

      - name: Commit and push price data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/prices/
          git diff --cached --quiet || git commit -m "chore: fetch stock prices [$(date -u +%Y-%m-%dT%H:%M)]"
          git push
